version: '3.8'
services:
  sys-monitor:
    build: .
    ports:
      - "80:3010"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
