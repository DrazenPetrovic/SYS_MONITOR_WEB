# Nginx konfiguracija za SYS_MONITOR_WEB aplikaciju
# Dodaj ovo unutar postojeceg server bloka (port 80) u /etc/nginx/sites-available/default

# Redirect /sistem bez trailing slash -> /sistem/
location = /sistem {
    return 301 /sistem/;
}

# Proxy svih zahtjeva /sistem/ na Express (port 3010)
# Nginx automatski skida /sistem/ prefiks prije proslijedjivanja
location /sistem/ {
    proxy_pass http://localhost:3010/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}

# -------------------------------------------------------------------
# DEPLOYMENT KORACI NA SERVERU:
#
# 1. Kloniraj/kopiraj projekat na server
#    cd /home/korisnik/SYS_MONITOR_WEB
#
# 2. Instaliraj dependencije
#    npm install
#
# 3. Provjeri .env fajl
#    nano .env
#
# 4. Buildiraj frontend
#    npm run build
#
# 5. Pokreni server sa PM2
#    pm2 start server.js --name sistem
#    pm2 save
#    pm2 startup
#
# 6. Dodaj nginx config (sadrzaj iznad) u nginx site fajl
#    sudo nginx -t
#    sudo systemctl reload nginx
# -------------------------------------------------------------------
